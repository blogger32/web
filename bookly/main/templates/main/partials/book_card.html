{% load static %}

<a href="{% if rental %}{% url 'reader' rental_id=rental.id %}{% else %}{% url 'book_details' book_id=book.id %}{% endif %}" class="book-card-modern">

    <div class="card-cover-wrapper">
        <img src="{% if book.cover_url %}{{ book.cover_url }}{% else %}{% static 'main/imgs/book_placeholder.png' %}{% endif %}"
             alt="{{ book.title }}" class="card-cover" loading="lazy">

        {% if rental and rental.progress %}
            {% widthratio rental.progress.current_page rental.progress.total_pages 100 as progress_percent %}
            <div class="card-progress-bar">
                <div class="card-progress-fill" style="width: {{ progress_percent }}%;"></div>
            </div>
        {% endif %}
    </div>

    <div class="card-info">
        <h3 class="card-title">{{ book.title }}</h3>
        <p class="card-author">{{ book.author_name }}</p>
    </div>
</a>
